name: Mirror to Resultant-Prototype

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://bvinsonrez:${MIRROR_PAT}@github.com" > ~/.git-credentials
          git remote add mirror https://github.com/Resultant-Prototype/gaming-regulator-demo.git
          git push mirror main --force
