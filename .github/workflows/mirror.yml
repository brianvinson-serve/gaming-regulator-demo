name: Mirror to Resultant-Prototype

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror via deploy key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.MIRROR_DEPLOY_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Push to mirror
        run: |
          git remote add mirror git@github.com:Resultant-Prototype/gaming-regulator-demo.git
          git push mirror main --force
